<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>封王封膜庫存監控</title>
  <script src="./dashboard-data.js"></script>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: rgba(255, 255, 255, 0.78);
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --quiet: #9a9aa0;
      --line: rgba(0, 0, 0, 0.09);
      --line-strong: rgba(0, 0, 0, 0.16);
      --blue: #0071e3;
      --green: #12834c;
      --amber: #b77900;
      --red: #d70015;
      --teal: #007a70;
      --violet: #6b5dd3;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: linear-gradient(180deg, #fbfbfd 0, var(--page) 260px, #eeeeef 100%);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1320px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0 42px;
    }

    .masthead {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 0 14px;
      background: rgba(245, 245, 247, 0.82);
      backdrop-filter: blur(20px);
    }

    .masthead-inner {
      display: grid;
      grid-template-columns: 1fr minmax(360px, 520px);
      gap: 14px;
      align-items: end;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(30px, 3.4vw, 42px);
      line-height: 1.08;
      font-weight: 750;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 13px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .header-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: start;
    }

    .sticky-controls {
      display: contents;
    }

    .search-stack {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 13px;
      width: 17px;
      height: 17px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      padding: 10px 13px 10px 39px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
      font-size: 16px;
    }

    .search input:focus {
      border-color: rgba(0, 113, 227, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
      background: #fff;
    }

    .source-line {
      display: grid;
      gap: 2px;
      min-height: 34px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .source-line span {
      overflow-wrap: anywhere;
    }

    .refresh-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      font-size: 15px;
      font-weight: 650;
      white-space: nowrap;
    }

    .refresh-button:hover {
      background: #fff;
      border-color: rgba(0, 0, 0, 0.18);
    }

    .refresh-button:focus-visible {
      outline: none;
      border-color: rgba(0, 113, 227, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
    }

    .refresh-button:disabled {
      cursor: wait;
      opacity: 0.78;
    }

    .refresh-button svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .refresh-button[data-state="loading"] svg {
      animation: spin 0.9s linear infinite;
    }

    .refresh-button[data-state="done"] {
      color: var(--green);
    }

    .refresh-button[data-state="error"] {
      color: var(--red);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .category-tabs {
      grid-column: 1 / -1;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 4px 0 2px;
      margin-top: 13px;
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-tabs button {
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }

    .category-tabs button[aria-pressed="true"] {
      border-color: rgba(0, 113, 227, 0.25);
      background: #1d1d1f;
      color: #fff;
      box-shadow: 0 9px 24px rgba(0, 0, 0, 0.12);
    }

    .content {
      display: grid;
      gap: 18px;
      margin-top: 8px;
    }

    .category-section {
      --category-accent: var(--blue);
      --category-soft: #eef6ff;
      --category-line: rgba(0, 113, 227, 0.18);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .category-tone-1 {
      --category-accent: var(--teal);
      --category-soft: #eefaf7;
      --category-line: rgba(0, 122, 112, 0.18);
    }

    .category-tone-2 {
      --category-accent: #a66a00;
      --category-soft: #fff7e8;
      --category-line: rgba(166, 106, 0, 0.2);
    }

    .category-tone-3 {
      --category-accent: var(--violet);
      --category-soft: #f4f2ff;
      --category-line: rgba(107, 93, 211, 0.18);
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      padding: 18px 18px 14px;
      border-top: 3px solid var(--category-accent);
      border-bottom: 1px solid var(--category-line);
      background: linear-gradient(90deg, var(--category-soft) 0, rgba(255, 255, 255, 0.9) 72%);
    }

    .category-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 730;
    }

    .category-count {
      padding: 4px 9px;
      border: 1px solid var(--category-line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
    }

    .series {
      padding: 16px 18px 18px;
      background: linear-gradient(180deg, #fff 0, #fff 58%, rgba(250, 250, 250, 0.86) 100%);
    }

    .series + .series {
      border-top: 1px solid var(--line);
    }

    .series-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      padding: 9px 10px;
      border: 1px solid var(--category-line);
      border-radius: var(--radius);
      background: linear-gradient(90deg, var(--category-soft), rgba(255, 255, 255, 0.78));
    }

    .series-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
    }

    .series-title::before {
      content: "";
      width: 7px;
      height: 20px;
      border-radius: 999px;
      background: var(--category-accent);
    }

    .series-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .item-list {
      display: grid;
      gap: 8px;
    }

    .item-row,
    .list-head {
      display: grid;
      grid-template-columns: minmax(260px, 1.7fr) repeat(5, minmax(78px, 0.54fr)) minmax(82px, 0.58fr);
      gap: 0;
      align-items: stretch;
    }

    .list-head {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.25;
      padding: 0 0 7px;
    }

    .list-head .number-label {
      text-align: right;
    }

    .list-head > div {
      padding: 5px 10px;
      border-radius: 6px;
    }

    .item-row {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .item-row:hover {
      border-color: rgba(0, 0, 0, 0.16);
      background: #fbfbfd;
    }

    .product-cell {
      min-width: 0;
      padding: 12px 13px;
      border-right: 1px solid var(--line);
    }

    .product-name {
      overflow-wrap: anywhere;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 650;
    }

    .product-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 9px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .warehouse-cell {
      display: grid;
      align-content: center;
      min-width: 0;
      padding: 10px 9px;
      border-right: 1px solid var(--line);
      text-align: right;
    }

    .warehouse-tone-0 {
      background: rgba(0, 113, 227, 0.035);
    }

    .warehouse-tone-1 {
      background: rgba(0, 122, 112, 0.04);
    }

    .warehouse-tone-2 {
      background: rgba(166, 106, 0, 0.045);
    }

    .warehouse-tone-3 {
      background: rgba(107, 93, 211, 0.035);
    }

    .warehouse-tone-4 {
      background: rgba(29, 29, 31, 0.032);
    }

    .list-head .warehouse-tone-0 {
      background: rgba(0, 113, 227, 0.075);
    }

    .list-head .warehouse-tone-1 {
      background: rgba(0, 122, 112, 0.078);
    }

    .list-head .warehouse-tone-2 {
      background: rgba(166, 106, 0, 0.085);
    }

    .list-head .warehouse-tone-3 {
      background: rgba(107, 93, 211, 0.075);
    }

    .list-head .warehouse-tone-4 {
      background: rgba(29, 29, 31, 0.062);
    }

    .warehouse-label {
      display: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }

    .warehouse-value {
      font-size: 18px;
      line-height: 1.1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .total-cell {
      display: grid;
      align-content: center;
      padding: 10px 11px;
      text-align: right;
      background: #fafafa;
    }

    .total-label {
      display: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }

    .total-value {
      font-size: 19px;
      line-height: 1.1;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .stock-critical {
      color: var(--red);
    }

    .stock-low {
      color: var(--amber);
    }

    .stock-high {
      color: var(--green);
    }

    .warehouse-cell-empty {
      background: #fcfcfd;
    }

    .zero-row .product-name {
      color: var(--muted);
    }

    .empty {
      display: none;
      min-height: 260px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .app {
        width: min(100% - 24px, 1320px);
        padding-top: 10px;
      }

      .masthead {
        display: contents;
        position: static;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .masthead-inner {
        display: contents;
      }

      .masthead-title {
        padding-top: 10px;
      }

      .sticky-controls {
        position: sticky;
        top: 0;
        z-index: 30;
        display: grid;
        gap: 8px;
        padding: calc(8px + env(safe-area-inset-top)) 0 10px;
        background: rgba(245, 245, 247, 0.9);
        backdrop-filter: blur(20px);
      }

      .header-actions {
        position: static;
        grid-template-columns: minmax(0, 1fr) auto;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .source-line {
        padding-left: 2px;
        font-size: 12px;
      }

      .category-tabs {
        margin-top: 0;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .meta {
        font-size: 14px;
      }

      .category-head {
        align-items: start;
        padding: 15px 14px 12px;
      }

      .category-title {
        font-size: 20px;
      }

      .series {
        padding: 14px;
      }

      .list-head {
        display: none;
      }

      .item-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        min-height: 0;
      }

      .product-cell {
        grid-column: 1 / -1;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 12px;
      }

      .warehouse-cell,
      .total-cell {
        display: grid;
        width: auto;
        min-height: 58px;
        padding: 9px 10px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      .warehouse-cell:nth-last-child(2) {
        border-right: 1px solid var(--line);
      }

      .warehouse-label,
      .total-label {
        display: block;
        margin-bottom: 5px;
      }

      .warehouse-value,
      .total-value {
        font-size: 18px;
      }

      .total-cell {
        background: #f7f7f8;
      }

      .warehouse-cell-empty {
        display: none;
      }
    }

    @media (max-width: 560px) {
      body {
        background: #f5f5f7;
      }

      .app {
        width: min(100% - 18px, 1320px);
      }

      h1 {
        font-size: 28px;
      }

      .category-tabs {
        margin-right: -9px;
        padding-right: 9px;
      }

      .category-tabs button {
        min-height: 33px;
        padding-inline: 10px;
      }

      .refresh-button {
        width: 44px;
        padding: 0;
      }

      .refresh-button span {
        display: none;
      }

      .category-section {
        border-radius: var(--radius);
      }

      .category-head {
        display: block;
      }

      .category-count {
        display: block;
        margin-top: 6px;
      }

      .series-head {
        align-items: start;
      }

      .warehouse-cell,
      .total-cell {
        width: auto;
      }

      .item-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .warehouse-cell:nth-child(3),
      .warehouse-cell:nth-child(5) {
        border-right: 0;
      }

      .total-cell {
        width: auto;
        grid-column: 1 / -1;
        border-right: 0;
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="masthead">
      <div class="masthead-inner">
        <div class="masthead-title">
          <h1>封王封膜庫存監控</h1>
          <div class="meta">
            <span id="result-count">-</span>
          </div>
        </div>
        <div class="sticky-controls">
          <div class="header-actions">
            <div class="search-stack">
              <label class="search">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="m21 21-4.2-4.2m1.2-5.3a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input id="search" type="search" autocomplete="off" placeholder="搜尋品名、規格">
              </label>
              <div class="source-line" id="source-line">
                <span id="source-filename">資料來源：-</span>
                <span id="source-modified">檔案修改：-</span>
              </div>
            </div>
          <button class="refresh-button" id="refresh-data" type="button" title="重新整理整個頁面" aria-label="重新整理整個頁面">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.5 6.2L3 16m0 0v5h5M3 12a9 9 0 0 1 15.5-6.2L21 8m0 0V3h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>重新整理</span>
            </button>
          </div>
          <nav class="category-tabs" id="category-tabs" aria-label="分類篩選"></nav>
        </div>
      </div>
    </header>

    <section class="content" id="content" aria-label="產品分類庫存"></section>
    <div class="empty" id="empty-state">沒有符合條件的品項</div>
  </main>

  <script>
    let data = window.INVENTORY_DASHBOARD_DATA || {
      items: [],
      source: { reportDates: [], lastModified: "", filename: "" },
      warehouseOrder: ["台北倉", "台中倉", "台南倉", "高雄倉", "欣凱倉"],
      warehouseLabels: {},
      categoryRules: []
    };

    const state = {
      query: "",
      category: "all"
    };

    const numberFormatter = new Intl.NumberFormat("zh-Hant-TW", {
      maximumFractionDigits: 2
    });

    const dateFormatter = new Intl.DateTimeFormat("zh-Hant-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });

    function formatNumber(value) {
      const number = Number(value || 0);
      return numberFormatter.format(Math.round(number * 100) / 100);
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "-";
      return dateFormatter.format(date);
    }

    function stockClass(value, item) {
      const number = Number(value || 0);
      const rule = item?.stockRule || {};
      const criticalAt = Number(rule.criticalAt ?? 20);
      const warningBelow = Number(rule.warningBelow ?? 40);
      if (number <= criticalAt) return "stock-critical";
      if (number < warningBelow) return "stock-low";
      return "stock-high";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseDashboardDataScript(text) {
      const prefix = "window.INVENTORY_DASHBOARD_DATA = ";
      const trimmed = String(text || "").trim();
      if (!trimmed.startsWith(prefix)) {
        throw new Error("Unexpected dashboard data format");
      }
      const json = trimmed.slice(prefix.length).replace(/;\s*$/, "");
      return JSON.parse(json);
    }

    function categoryNames() {
      const names = data.categoryRules.map((rule) => rule.category);
      for (const item of data.items) {
        if (!names.includes(item.category)) names.push(item.category);
      }
      return names;
    }

    function matchesQuery(item) {
      const query = state.query.trim().toLocaleLowerCase("zh-Hant-TW");
      if (!query) return true;
      const haystack = `${item.name} ${item.spec}`.toLocaleLowerCase("zh-Hant-TW");
      return haystack.includes(query);
    }

    function visibleItems() {
      return data.items.filter((item) => {
        if (state.category !== "all" && item.category !== state.category) return false;
        return matchesQuery(item);
      });
    }

    function itemsFor(category, series) {
      return visibleItems().filter((item) => item.category === category && item.series === series);
    }

    function renderMeta() {
      const source = data.source || {};
      const sourceTime = formatDateTime(source.lastModified);
      document.getElementById("source-filename").textContent = `資料來源：${source.filename || "-"}`;
      document.getElementById("source-modified").textContent = `檔案修改：${sourceTime}`;
    }

    function renderTabs() {
      const tabs = ["all", ...categoryNames()];
      if (!tabs.includes(state.category)) state.category = "all";
      const tabRoot = document.getElementById("category-tabs");
      tabRoot.innerHTML = tabs.map((category) => {
        const label = category === "all" ? "全部" : category;
        const pressed = category === state.category;
        return `<button type="button" data-category="${escapeHtml(category)}" aria-pressed="${pressed}">${escapeHtml(label)}</button>`;
      }).join("");

      tabRoot.querySelectorAll("button").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = button.dataset.category;
          renderTabs();
          renderContent();
        });
      });
    }

    function refreshDashboardData() {
      const button = document.getElementById("refresh-data");
      const label = button.querySelector("span");
      button.disabled = true;
      button.dataset.state = "loading";
      if (label) label.textContent = "重新載入";

      const url = new URL(window.location.href);
      url.searchParams.set("refresh", Date.now().toString());
      window.location.replace(url.toString());
    }

    async function loadLatestDashboardData() {
      try {
        const response = await fetch(`./dashboard-data.js?refresh=${Date.now()}`, {
          cache: "no-store"
        });
        if (!response.ok) return;

        data = parseDashboardDataScript(await response.text());
        renderMeta();
        renderTabs();
        renderContent();
      } catch (error) {
        console.error(error);
      }
    }

    function itemTemplate(item) {
      const warehouseCells = data.warehouseOrder.map((warehouse, index) => {
        const value = item.warehouses[warehouse] || 0;
        const label = data.warehouseLabels[warehouse] || warehouse;
        const toneClass = `warehouse-tone-${index % 5}`;
        if (warehouse === "欣凱倉" && Number(value || 0) === 0) {
          return `<div class="warehouse-cell warehouse-cell-empty ${toneClass}" aria-label="${escapeHtml(label)} 0"></div>`;
        }
        return `
          <div class="warehouse-cell ${toneClass}">
            <span class="warehouse-label">${escapeHtml(label)}</span>
            <span class="warehouse-value ${stockClass(value, item)}">${formatNumber(value)}</span>
          </div>
        `;
      }).join("");

      return `
        <article class="item-row ${Number(item.visibleTotal || 0) === 0 ? "zero-row" : ""}">
          <div class="product-cell">
            <div class="product-name">${escapeHtml(item.name)}</div>
            <div class="product-sub">
              <span>${escapeHtml(item.code)}</span>
              <span>${escapeHtml(item.spec || "-")}</span>
            </div>
          </div>
          ${warehouseCells}
          <div class="total-cell">
            <span class="total-label">合計</span>
            <span class="total-value ${stockClass(item.visibleTotal, item)}">${formatNumber(item.visibleTotal)}</span>
          </div>
        </article>
      `;
    }

    function seriesTemplate(categoryName, series) {
      const items = itemsFor(categoryName, series.name);
      if (!items.length) return "";
      const headLabels = data.warehouseOrder.map((warehouse, index) => {
        const label = data.warehouseLabels[warehouse] || warehouse;
        return `<div class="number-label warehouse-tone-${index % 5}">${escapeHtml(label)}</div>`;
      }).join("");

      return `
        <section class="series">
          <div class="series-head">
            <h3 class="series-title">${escapeHtml(series.name)}</h3>
            <span class="series-count">${formatNumber(items.length)} 項</span>
          </div>
          <div class="list-head">
            <div>品項</div>
            ${headLabels}
            <div class="number-label">合計</div>
          </div>
          <div class="item-list">
            ${items.map(itemTemplate).join("")}
          </div>
        </section>
      `;
    }

    function uncategorizedRules() {
      const known = new Set(data.categoryRules.map((rule) => rule.category));
      const extras = categoryNames().filter((name) => !known.has(name));
      return extras.map((category) => ({
        category,
        series: [{ name: "未分類", items: [] }]
      }));
    }

    function renderContent() {
      const search = document.getElementById("search");
      if (search) state.query = search.value;

      const allVisible = visibleItems();
      const root = document.getElementById("content");
      const empty = document.getElementById("empty-state");
      const rules = [...data.categoryRules, ...uncategorizedRules()];

      document.getElementById("result-count").textContent = `${formatNumber(allVisible.length)} 項`;

      const html = rules.map((categoryRule, categoryIndex) => {
        if (state.category !== "all" && state.category !== categoryRule.category) return "";

        const categoryItems = allVisible.filter((item) => item.category === categoryRule.category);
        if (!categoryItems.length) return "";

        const seriesHtml = categoryRule.series
          .map((series) => seriesTemplate(categoryRule.category, series))
          .join("");

        if (!seriesHtml.trim()) return "";

        return `
          <section class="category-section category-tone-${categoryIndex % 4}">
            <header class="category-head">
              <h2 class="category-title">${escapeHtml(categoryRule.category)}</h2>
              <span class="category-count">${formatNumber(categoryItems.length)} 項</span>
            </header>
            ${seriesHtml}
          </section>
        `;
      }).join("");

      root.innerHTML = html;
      empty.style.display = allVisible.length ? "none" : "grid";
    }

    document.getElementById("search").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderContent();
    });

    document.getElementById("search").addEventListener("search", (event) => {
      state.query = event.target.value;
      renderContent();
    });

    document.getElementById("refresh-data").addEventListener("click", refreshDashboardData);

    renderMeta();
    renderTabs();
    renderContent();
    loadLatestDashboardData();
  </script>
</body>
</html>
