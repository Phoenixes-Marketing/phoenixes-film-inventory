<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <title>封王封膜庫存監控</title>
  <script src="./dashboard-data.js"></script>
  <script src="./purchase-alert-data.js"></script>
  <script src="./traffic-counter-config.js?v=20260709-traffic-api"></script>
  <script src="./internal-access-config.js?v=20260724-cost-auth"></script>
  <link rel="stylesheet" href="./internal-access.css?v=20260724-cost-auth">
  <script src="./internal-access.js?v=20260724-cost-auth" defer></script>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f5f7;
      --surface: #ffffff;
      --surface-soft: rgba(255, 255, 255, 0.78);
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --quiet: #9a9aa0;
      --line: rgba(0, 0, 0, 0.09);
      --line-strong: rgba(0, 0, 0, 0.16);
      --blue: #0071e3;
      --green: #12834c;
      --amber: #b77900;
      --red: #d70015;
      --teal: #007a70;
      --violet: #6b5dd3;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.08);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 320px;
      background: linear-gradient(180deg, #fbfbfd 0, var(--page) 260px, #eeeeef 100%);
      color: var(--ink);
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1320px, calc(100% - 40px));
      margin: 0 auto;
      padding: 22px 0 42px;
    }

    .masthead {
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 12px 0 14px;
      background: rgba(245, 245, 247, 0.82);
      backdrop-filter: blur(20px);
    }

    .masthead-inner {
      display: grid;
      grid-template-columns: 1fr minmax(520px, 660px);
      gap: 14px;
      align-items: end;
    }

    h1 {
      margin: 0 0 7px;
      font-size: clamp(30px, 3.4vw, 42px);
      line-height: 1.08;
      font-weight: 750;
      letter-spacing: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 13px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .traffic-count {
      display: inline-flex;
      align-items: baseline;
      gap: 4px;
      color: var(--muted);
      white-space: nowrap;
    }

    .traffic-count-value {
      color: var(--ink);
      font-weight: 720;
      font-variant-numeric: tabular-nums;
    }

    .search {
      position: relative;
      min-width: 0;
    }

    .header-actions {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: start;
    }

    .sticky-controls {
      display: contents;
    }

    .search-stack {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .search svg {
      position: absolute;
      top: 50%;
      left: 13px;
      width: 17px;
      height: 17px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search input {
      width: 100%;
      min-height: 42px;
      padding: 10px 13px 10px 39px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      outline: none;
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
      font-size: 16px;
    }

    .search input:focus {
      border-color: rgba(0, 113, 227, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
      background: #fff;
    }

    .source-line {
      display: grid;
      gap: 2px;
      min-height: 34px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .source-line span {
      overflow-wrap: anywhere;
    }

    .refresh-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 42px;
      padding: 0 12px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      color: var(--ink);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.05);
      cursor: pointer;
      font-size: 15px;
      font-weight: 650;
      white-space: nowrap;
    }

    .refresh-button:hover {
      background: #fff;
      border-color: rgba(0, 0, 0, 0.18);
    }

    .refresh-button:focus-visible {
      outline: none;
      border-color: rgba(0, 113, 227, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
    }

    .refresh-button:disabled {
      cursor: wait;
      opacity: 0.78;
    }

    .refresh-button svg {
      width: 17px;
      height: 17px;
      flex: 0 0 auto;
    }

    .refresh-button[data-state="loading"] svg {
      animation: spin 0.9s linear infinite;
    }

    .refresh-button[data-state="done"] {
      color: var(--green);
    }

    .refresh-button[data-state="error"] {
      color: var(--red);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .category-tabs {
      grid-column: 1 / -1;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      padding: 4px 0 2px;
      margin-top: 13px;
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .category-tabs button {
      min-height: 34px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      white-space: nowrap;
    }

    .category-tabs button[aria-pressed="true"] {
      border-color: rgba(0, 113, 227, 0.25);
      background: #1d1d1f;
      color: #fff;
      box-shadow: 0 9px 24px rgba(0, 0, 0, 0.12);
    }

    .category-tabs button[data-tone="public"] {
      border-color: rgba(74, 144, 226, 0.22);
      background: linear-gradient(135deg, rgba(246, 251, 255, 0.92), rgba(220, 239, 255, 0.92));
      color: #17385f;
    }

    .category-tabs button[data-tone="special"] {
      border-color: rgba(72, 176, 142, 0.2);
      background: linear-gradient(135deg, rgba(245, 255, 250, 0.94), rgba(214, 244, 235, 0.92));
      color: #123f35;
    }

    .category-tabs button[data-tone="sakura"] {
      border-color: rgba(174, 112, 221, 0.18);
      background: linear-gradient(135deg, rgba(253, 247, 255, 0.94), rgba(255, 228, 243, 0.92));
      color: #41234f;
    }

    .category-tabs button[data-tone][aria-pressed="true"] {
      box-shadow: 0 10px 24px rgba(33, 54, 82, 0.11), inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .category-tabs button[data-tone="public"][aria-pressed="true"] {
      border-color: rgba(74, 144, 226, 0.36);
      background: linear-gradient(135deg, #f0f8ff 0%, #cfe8ff 100%);
      color: #0f3154;
    }

    .category-tabs button[data-tone="special"][aria-pressed="true"] {
      border-color: rgba(72, 176, 142, 0.34);
      background: linear-gradient(135deg, #effdf7 0%, #c8efe2 100%);
      color: #0f3a31;
    }

    .category-tabs button[data-tone="sakura"][aria-pressed="true"] {
      border-color: rgba(174, 112, 221, 0.3);
      background: linear-gradient(135deg, #fcf2ff 0%, #ffdbe9 100%);
      color: #3c214a;
    }

    .category-tabs button[data-alert-filter="watch"] {
      border-color: rgba(218, 149, 48, 0.28);
      background: linear-gradient(135deg, #fff9e8 0%, #ffe7b0 100%);
      color: #4b3300;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58);
    }

    .category-tabs button[data-alert-filter="order"] {
      border-color: rgba(212, 76, 104, 0.28);
      background: linear-gradient(135deg, #fff0f3 0%, #ffd1da 100%);
      color: #5b1020;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .category-tabs button[data-alert-filter="watch"][aria-pressed="true"] {
      border-color: rgba(218, 149, 48, 0.4);
      background: linear-gradient(135deg, #fff4d2 0%, #ffd989 100%);
      color: #3b2900;
      box-shadow: 0 11px 24px rgba(222, 154, 55, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .category-tabs button[data-alert-filter="order"][aria-pressed="true"] {
      border-color: rgba(212, 76, 104, 0.4);
      background: linear-gradient(135deg, #ffe6ec 0%, #ffb7c5 100%);
      color: #4f0d1b;
      box-shadow: 0 11px 24px rgba(212, 76, 104, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.48);
    }

    .category-tabs button[data-alert-filter="notes"] {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-height: 34px;
      padding: 7px 12px;
      border-color: rgba(221, 162, 0, 0.3);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.86);
      color: #f2ad00;
    }

    .category-tabs button[data-alert-filter="notes"][aria-pressed="true"] {
      border-color: rgba(221, 162, 0, 0.46);
      background: #fff;
      box-shadow: 0 9px 22px rgba(221, 162, 0, 0.13);
    }

    .note-star-icon {
      display: block;
    }

    .note-filter-icon {
      width: 23px;
      height: 23px;
    }

    .category-tabs button[data-alert-filter="notes"] .tab-count {
      color: var(--muted);
      opacity: 1;
    }

    .tab-count {
      opacity: 0.78;
    }

    .content {
      display: grid;
      gap: 18px;
      margin-top: 8px;
    }

    .category-section {
      --category-accent: var(--blue);
      --category-soft: #eef6ff;
      --category-line: rgba(0, 113, 227, 0.18);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .category-tone-1 {
      --category-accent: var(--teal);
      --category-soft: #eefaf7;
      --category-line: rgba(0, 122, 112, 0.18);
    }

    .category-tone-2 {
      --category-accent: #a66a00;
      --category-soft: #fff7e8;
      --category-line: rgba(166, 106, 0, 0.2);
    }

    .category-tone-3 {
      --category-accent: var(--violet);
      --category-soft: #f4f2ff;
      --category-line: rgba(107, 93, 211, 0.18);
    }

    .category-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
      padding: 18px 18px 14px;
      border-top: 3px solid var(--category-accent);
      border-bottom: 1px solid var(--category-line);
      background: linear-gradient(90deg, var(--category-soft) 0, rgba(255, 255, 255, 0.9) 72%);
    }

    .category-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 730;
    }

    .category-count {
      padding: 4px 9px;
      border: 1px solid var(--category-line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 15px;
      white-space: nowrap;
    }

    .series {
      padding: 16px 18px 18px;
      background: linear-gradient(180deg, #fff 0, #fff 58%, rgba(250, 250, 250, 0.86) 100%);
    }

    .series + .series {
      border-top: 1px solid var(--line);
    }

    .series-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
      padding: 9px 10px;
      border: 1px solid var(--category-line);
      border-radius: var(--radius);
      background: linear-gradient(90deg, var(--category-soft), rgba(255, 255, 255, 0.78));
    }

    .series-title {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 700;
    }

    .series-title::before {
      content: "";
      width: 7px;
      height: 20px;
      border-radius: 999px;
      background: var(--category-accent);
    }

    .series-count {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .item-list {
      display: grid;
      gap: 8px;
    }

    .item-row,
    .list-head {
      display: grid;
      grid-template-columns: minmax(260px, 1.7fr) repeat(5, minmax(78px, 0.54fr)) minmax(82px, 0.58fr);
      gap: 0;
      align-items: stretch;
    }

    .list-head {
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
      line-height: 1.25;
      padding: 0 0 7px;
    }

    .list-head .number-label {
      text-align: right;
    }

    .list-head > div {
      padding: 5px 10px;
      border-radius: 6px;
    }

    .item-row {
      min-height: 72px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .item-row:hover {
      border-color: rgba(0, 0, 0, 0.16);
      background: #fbfbfd;
    }

    .product-cell {
      min-width: 0;
      padding: 12px 13px;
      border-right: 1px solid var(--line);
    }

    .product-name {
      overflow-wrap: anywhere;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 650;
    }

    .product-sub {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 9px;
      margin-top: 6px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.3;
    }

    .list-price-line {
      display: flex;
      justify-content: flex-start;
      margin-top: 6px;
    }

    .list-price-badge {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      min-height: 24px;
      padding: 2px 7px;
      border: 1px solid rgba(110, 76, 190, 0.22);
      border-radius: 999px;
      background: linear-gradient(135deg, #f7f2ff 0%, #eadfff 100%);
      color: #563395;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 760;
      vertical-align: 2px;
      white-space: nowrap;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.62);
    }

    .list-price-label {
      color: #7759a9;
      font-size: 11px;
      font-weight: 700;
    }

    .list-price-value {
      font-variant-numeric: tabular-nums;
    }

    .business-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 9px;
    }

    .business-metric {
      display: inline-flex;
      align-items: baseline;
      gap: 5px;
      min-height: 28px;
      padding: 5px 9px;
      border: 1px solid rgba(0, 113, 227, 0.13);
      border-radius: 9px;
      background: linear-gradient(135deg, rgba(245, 250, 255, 0.96), rgba(233, 244, 255, 0.96));
      color: #25445f;
      font-size: 13px;
      line-height: 1.25;
    }

    .business-metric-label {
      color: var(--muted);
      font-weight: 600;
    }

    .business-metric-value {
      color: inherit;
      font-size: 14px;
      font-weight: 760;
      white-space: nowrap;
    }

    .purchase-alerts {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .purchase-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 25px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 13px;
      line-height: 1.25;
      font-weight: 700;
      max-width: 100%;
      white-space: normal;
    }

    .purchase-badge-watch {
      border: 1px solid rgba(218, 149, 48, 0.24);
      background: linear-gradient(135deg, #fff9e8 0%, #ffe7b0 100%);
      color: #4b3300;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.58);
    }

    .purchase-badge-order {
      border: 1px solid rgba(212, 76, 104, 0.24);
      background: linear-gradient(135deg, #fff0f3 0%, #ffd1da 100%);
      color: #5b1020;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.48);
    }

    .product-title-row {
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      min-width: 0;
    }

    .product-title-row .product-name {
      flex: 1 1 auto;
      min-width: 0;
    }

    .product-title-row.has-note .product-name {
      padding-right: 48px;
    }

    .note-tag {
      position: absolute;
      top: 0;
      right: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      width: 40px;
      height: 40px;
      border: 1px solid rgba(221, 162, 0, 0.25);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      color: #f2ad00;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.05);
    }

    .note-tag:hover {
      border-color: rgba(221, 162, 0, 0.42);
      background: #fff;
      color: #dc9700;
      box-shadow: 0 9px 24px rgba(221, 162, 0, 0.15);
    }

    .note-tag:focus-visible {
      outline: none;
      border-color: rgba(0, 113, 227, 0.58);
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
    }

    .note-tag[data-has-note="true"] {
      border-color: rgba(221, 162, 0, 0.3);
      background: #fff;
      color: #f2ad00;
    }

    .note-tag svg {
      width: 30px;
      height: 30px;
      flex: 0 0 auto;
    }

    .note-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      background: transparent;
    }

    .note-backdrop.is-open {
      display: block;
    }

    .note-popover {
      position: fixed;
      z-index: 81;
      width: min(330px, calc(100vw - 28px));
      padding: 14px 14px 13px;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.17);
    }

    .note-popover-title {
      margin: 0 34px 4px 0;
      font-size: 15px;
      line-height: 1.3;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .note-popover-meta {
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.25;
      font-weight: 700;
    }

    .note-popover-body {
      color: var(--ink);
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .note-popover-body.is-empty {
      color: var(--muted);
    }

    .note-close {
      position: absolute;
      top: 7px;
      right: 7px;
      display: grid;
      place-items: center;
      width: 30px;
      height: 30px;
      border: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      cursor: pointer;
    }

    .note-close:hover {
      background: rgba(255, 255, 255, 0.95);
      color: var(--ink);
    }

    .note-close:focus-visible {
      outline: none;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.13);
    }

    .warehouse-cell {
      display: grid;
      align-content: center;
      min-width: 0;
      padding: 10px 9px;
      border-right: 1px solid var(--line);
      text-align: right;
    }

    .warehouse-tone-0 {
      background: rgba(0, 113, 227, 0.035);
    }

    .warehouse-tone-1 {
      background: rgba(0, 122, 112, 0.04);
    }

    .warehouse-tone-2 {
      background: rgba(166, 106, 0, 0.045);
    }

    .warehouse-tone-3 {
      background: rgba(107, 93, 211, 0.035);
    }

    .warehouse-tone-4 {
      background: rgba(29, 29, 31, 0.032);
    }

    .list-head .warehouse-tone-0 {
      background: rgba(0, 113, 227, 0.075);
    }

    .list-head .warehouse-tone-1 {
      background: rgba(0, 122, 112, 0.078);
    }

    .list-head .warehouse-tone-2 {
      background: rgba(166, 106, 0, 0.085);
    }

    .list-head .warehouse-tone-3 {
      background: rgba(107, 93, 211, 0.075);
    }

    .list-head .warehouse-tone-4 {
      background: rgba(29, 29, 31, 0.062);
    }

    .warehouse-label {
      display: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }

    .warehouse-value {
      font-size: 18px;
      line-height: 1.1;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .total-cell {
      display: grid;
      align-content: center;
      padding: 10px 11px;
      text-align: right;
      background: #fafafa;
    }

    .total-label {
      display: none;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.2;
    }

    .total-value {
      font-size: 19px;
      line-height: 1.1;
      font-weight: 760;
      font-variant-numeric: tabular-nums;
    }

    .stock-critical {
      color: var(--red);
    }

    .stock-low {
      color: var(--amber);
    }

    .stock-high {
      color: var(--green);
    }

    .warehouse-cell-empty {
      background: #fcfcfd;
    }

    .zero-row .product-name {
      color: var(--muted);
    }

    .empty {
      display: none;
      min-height: 260px;
      place-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      font-size: 16px;
    }

    @media (max-width: 900px) {
      .app {
        width: 100%;
        padding-top: 10px;
      }

      .masthead {
        display: contents;
        position: static;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .masthead-inner {
        display: contents;
      }

      .masthead-title {
        padding: 10px 20px 0;
      }

      .sticky-controls {
        position: sticky;
        top: 0;
        z-index: 30;
        display: grid;
        gap: 8px;
        padding: calc(8px + env(safe-area-inset-top)) 20px 10px;
        background: rgba(245, 245, 247, 0.9);
        backdrop-filter: blur(20px);
      }

      .header-actions {
        position: static;
        grid-template-columns: minmax(0, 1fr) auto auto;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .content,
      .empty {
        margin-inline: 20px;
      }

      .source-line {
        padding-left: 2px;
        font-size: 12px;
      }

      .category-tabs {
        margin-top: 0;
        padding: 0;
        background: transparent;
        backdrop-filter: none;
      }

      .meta {
        font-size: 14px;
      }

      .category-head {
        align-items: start;
        padding: 15px 14px 12px;
      }

      .category-title {
        font-size: 20px;
      }

      .series {
        padding: 14px;
      }

      .list-head {
        display: none;
      }

      .item-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        min-height: 0;
      }

      .product-cell {
        grid-column: 1 / -1;
        border-right: 0;
        border-bottom: 1px solid var(--line);
        padding: 12px;
      }

      .warehouse-cell,
      .total-cell {
        display: grid;
        width: auto;
        min-height: 58px;
        padding: 9px 10px;
        border-right: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        text-align: left;
      }

      .warehouse-cell:nth-last-child(2) {
        border-right: 1px solid var(--line);
      }

      .warehouse-label,
      .total-label {
        display: block;
        margin-bottom: 5px;
      }

      .warehouse-value,
      .total-value {
        font-size: 18px;
      }

      .total-cell {
        background: #f7f7f8;
      }

      .warehouse-cell-empty {
        display: none;
      }

      .note-popover {
        max-height: min(58vh, 420px);
        overflow: auto;
      }
    }

    @media (max-width: 560px) {
      body {
        background: #f5f5f7;
      }

      .app {
        width: 100%;
      }

      .masthead-title {
        padding-inline: 18px;
      }

      .sticky-controls {
        padding-inline: 18px;
      }

      .content,
      .empty {
        margin-inline: 18px;
      }

      .header-actions {
        grid-template-columns: minmax(0, 1fr) 44px;
      }

      .search-stack {
        grid-column: 1 / -1;
      }

      .internal-access-button {
        grid-column: 1;
        justify-self: start;
      }

      h1 {
        font-size: 28px;
      }

      .category-tabs {
        margin-right: 0;
        padding-right: 0;
      }

      .category-tabs button {
        min-height: 33px;
        padding-inline: 10px;
      }

      .refresh-button {
        grid-column: 2;
        grid-row: 2;
        width: 44px;
        padding: 0;
      }

      .refresh-button span {
        display: none;
      }

      .category-section {
        border-radius: var(--radius);
      }

      .category-head {
        display: block;
      }

      .category-count {
        display: block;
        margin-top: 6px;
      }

      .series-head {
        align-items: start;
      }

      .warehouse-cell,
      .total-cell {
        width: auto;
      }

      .item-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .product-title-row {
        gap: 7px;
      }

      .note-tag {
        width: 40px;
        height: 40px;
      }

      .note-backdrop.is-open {
        background: rgba(0, 0, 0, 0.06);
      }

      .note-popover {
        left: 9px !important;
        right: 9px;
        bottom: calc(12px + env(safe-area-inset-bottom));
        top: auto !important;
        width: auto;
      }

      .warehouse-cell:nth-child(3),
      .warehouse-cell:nth-child(5) {
        border-right: 0;
      }

      .total-cell {
        width: auto;
        grid-column: 1 / -1;
        border-right: 0;
        border-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="masthead">
      <div class="masthead-inner">
        <div class="masthead-title">
          <h1>封王封膜庫存監控</h1>
          <div class="meta">
            <span id="result-count">-</span>
            <span class="traffic-count" id="traffic-count" aria-live="polite">
              <span>今日瀏覽</span>
              <span class="traffic-count-value" id="traffic-count-value">-</span>
              <span>次</span>
            </span>
          </div>
        </div>
        <div class="sticky-controls">
          <div class="header-actions">
            <div class="search-stack">
              <label class="search">
                <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="m21 21-4.2-4.2m1.2-5.3a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <input id="search" type="search" autocomplete="off" placeholder="搜尋品名、規格">
              </label>
              <div class="source-line" id="source-line">
                <span id="source-filename">資料來源：-</span>
                <span id="source-modified">檔案修改：-</span>
              </div>
            </div>
          <button class="refresh-button" id="refresh-data" type="button" title="重新整理整個頁面" aria-label="重新整理整個頁面">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M21 12a9 9 0 0 1-15.5 6.2L3 16m0 0v5h5M3 12a9 9 0 0 1 15.5-6.2L21 8m0 0V3h-5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>重新整理</span>
            </button>
          </div>
          <nav class="category-tabs" id="category-tabs" aria-label="分類與採購提醒篩選"></nav>
        </div>
      </div>
    </header>

    <section class="content" id="content" aria-label="產品分類庫存"></section>
    <div class="empty" id="empty-state">沒有符合條件的品項</div>
  </main>

  <script>
    let data = window.INVENTORY_DASHBOARD_DATA || {
      items: [],
      source: { reportDates: [], lastModified: "", filename: "" },
      warehouseOrder: ["台北倉", "台中倉", "台南倉", "高雄倉", "欣凱倉"],
      warehouseLabels: {},
      categoryRules: []
    };
    let costSalesData = {
      items: {},
      source: {}
    };
    const purchaseAlertSettings = window.PURCHASE_ALERT_SETTINGS || {
      settings: {},
      summary: {}
    };

    const state = {
      query: "",
      category: "all",
      alertFilter: "all",
      internalUnlocked: false
    };

    const noteLayer = {
      backdrop: null,
      popover: null,
      activeCode: ""
    };

    const numberFormatter = new Intl.NumberFormat("zh-Hant-TW", {
      maximumFractionDigits: 2
    });

    const dateFormatter = new Intl.DateTimeFormat("zh-Hant-TW", {
      year: "numeric",
      month: "2-digit",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit"
    });

    function formatNumber(value) {
      const number = Number(value || 0);
      return numberFormatter.format(Math.round(number * 100) / 100);
    }

    function formatAverageCost(value) {
      if (value === null || value === undefined || value === "") return "—";
      const number = Number(value);
      if (!Number.isFinite(number)) return "—";
      return `NT$${number.toLocaleString("zh-TW", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      })}`;
    }

    function costSalesForItem(item) {
      return costSalesData.items?.[item.code] || null;
    }

    function formatDateTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value || "-";
      return dateFormatter.format(date);
    }

    function trafficCounterConfig() {
      const config = window.INVENTORY_TRAFFIC_COUNTER_CONFIG || {};
      const timeoutMs = Number(config.timeoutMs ?? 2500);
      return {
        enabled: config.enabled !== false,
        endpoint: String(config.endpoint || "").trim(),
        app: String(config.app || "phoenixes-film-inventory"),
        timeoutMs: Number.isFinite(timeoutMs) && timeoutMs > 0 ? timeoutMs : 2500,
        debug: config.debug === true
      };
    }

    function renderTrafficCount(value) {
      const target = document.getElementById("traffic-count-value");
      if (!target) return;
      if (value === null || value === undefined || value === "") {
        target.textContent = "-";
        return;
      }
      const count = Number(value);
      target.textContent = Number.isFinite(count) && count >= 0 ? formatNumber(count) : "-";
    }

    function logTrafficCounterError(error) {
      if (trafficCounterConfig().debug) {
        console.warn("Traffic counter unavailable.", error);
      }
    }

    async function recordTrafficCount() {
      const config = trafficCounterConfig();
      renderTrafficCount(null);
      if (!config.enabled || !config.endpoint) return;

      const controller = new AbortController();
      const timer = window.setTimeout(() => controller.abort(), config.timeoutMs);

      try {
        const response = await fetch(config.endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ app: config.app }),
          cache: "no-store",
          credentials: "omit",
          mode: "cors",
          signal: controller.signal
        });
        if (!response.ok) throw new Error(`Traffic counter returned ${response.status}`);

        const payload = await response.json();
        renderTrafficCount(payload?.count);
      } catch (error) {
        logTrafficCounterError(error);
      } finally {
        window.clearTimeout(timer);
      }
    }

    function stockClass(value, item) {
      const number = Number(value || 0);
      const rule = item?.stockRule || {};
      const criticalAt = Number(rule.criticalAt ?? 20);
      const warningBelow = Number(rule.warningBelow ?? 40);
      if (number <= criticalAt) return "stock-critical";
      if (number < warningBelow) return "stock-low";
      return "stock-high";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function noteForItem(item) {
      const text = String(purchaseAlertSettings.settings?.[item.name]?.note || "").trim();
      return { text };
    }

    function listPriceForItem(item) {
      const value = purchaseAlertSettings.settings?.[item.name]?.listPrice;
      if (value === null || value === undefined || value === "") return null;
      const number = Number(value);
      return Number.isFinite(number) ? number : null;
    }

    function formatListPrice(value) {
      return `NT$${Number(value).toLocaleString("zh-TW", {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      })}`;
    }

    function hasItemNote(item) {
      return Boolean(noteForItem(item).text);
    }

    function noteStarSvg(id, className = "note-star-icon") {
      const safeId = escapeHtml(id);
      return `
        <svg class="${escapeHtml(className)}" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <linearGradient id="${safeId}" x1="7" y1="4" x2="17.5" y2="20" gradientUnits="userSpaceOnUse">
              <stop offset="0" stop-color="#fff2a8"/>
              <stop offset="0.52" stop-color="#ffd34a"/>
              <stop offset="1" stop-color="#f5a623"/>
            </linearGradient>
          </defs>
          <path d="M 12.58 4.71 L 14.22 7.84 Q 14.56 8.48 15.27 8.6 L 18.76 9.19 Q 19.99 9.4 19.12 10.3 L 16.64 12.83 Q 16.14 13.34 16.24 14.06 L 16.76 17.56 Q 16.94 18.8 15.82 18.24 L 12.65 16.67 Q 12 16.35 11.35 16.67 L 8.18 18.24 Q 7.06 18.8 7.24 17.56 L 7.76 14.06 Q 7.86 13.34 7.36 12.83 L 4.88 10.3 Q 4.01 9.4 5.24 9.19 L 8.73 8.6 Q 9.44 8.48 9.78 7.84 L 11.42 4.71 Q 12 3.6 12.58 4.71 Z" fill="url(#${safeId})"/>
        </svg>
      `;
    }

    function parseDashboardDataScript(text) {
      const prefix = "window.INVENTORY_DASHBOARD_DATA = ";
      const trimmed = String(text || "").trim();
      if (!trimmed.startsWith(prefix)) {
        throw new Error("Unexpected dashboard data format");
      }
      const json = trimmed.slice(prefix.length).replace(/;\s*$/, "");
      return JSON.parse(json);
    }

    function categoryNames() {
      const names = data.categoryRules.map((rule) => rule.category);
      for (const item of data.items) {
        if (!names.includes(item.category)) names.push(item.category);
      }
      return names;
    }

    function matchesQuery(item) {
      const query = state.query.trim().toLocaleLowerCase("zh-Hant-TW");
      if (!query) return true;
      const haystack = `${item.name} ${item.spec}`.toLocaleLowerCase("zh-Hant-TW");
      return haystack.includes(query);
    }

    function purchaseAlertForItem(item) {
      const setting = purchaseAlertSettings.settings?.[item.name];
      if (!setting || setting.enabled === false) {
        return { level: "normal", alerts: [] };
      }

      const alerts = [];
      for (const warehouse of data.warehouseOrder) {
        const thresholds = setting.thresholds?.[warehouse];
        if (!thresholds) continue;

        const value = Number(item.warehouses?.[warehouse] || 0);
        const label = data.warehouseLabels?.[warehouse] || warehouse;
        const order = Number(thresholds.order || 0);
        const watch = Number(thresholds.watch || 0);

        if (order > 0 && value < order) {
          alerts.push({ level: "order", label, value, threshold: order });
        } else if (watch > 0 && value < watch) {
          alerts.push({ level: "watch", label, value, threshold: watch });
        }
      }

      const total = setting.total || {};
      const visibleTotal = Number(item.visibleTotal || 0);
      const totalOrder = Number(total.order || 0);
      const totalWatch = Number(total.watch || 0);
      if (totalOrder > 0 && visibleTotal < totalOrder) {
        alerts.push({ level: "order", label: "合計", value: visibleTotal, threshold: totalOrder });
      } else if (totalWatch > 0 && visibleTotal < totalWatch) {
        alerts.push({ level: "watch", label: "合計", value: visibleTotal, threshold: totalWatch });
      }

      alerts.sort((a, b) => (a.level === "order" ? 0 : 1) - (b.level === "order" ? 0 : 1));
      const level = alerts.some((alert) => alert.level === "order")
        ? "order"
        : alerts.length
          ? "watch"
          : "normal";
      return { level, alerts };
    }

    function matchesAlertFilter(item) {
      if (state.alertFilter === "all") return true;
      const alert = purchaseAlertForItem(item);
      if (state.alertFilter === "order") return alert.level === "order";
      if (state.alertFilter === "watch") return alert.level === "order" || alert.level === "watch";
      if (state.alertFilter === "notes") return hasItemNote(item);
      return true;
    }

    function searchItems() {
      return data.items.filter(matchesQuery);
    }

    function baseItems() {
      return searchItems().filter((item) => state.category === "all" || item.category === state.category);
    }

    function visibleItems() {
      const items = state.alertFilter === "all" ? baseItems() : searchItems();
      return items.filter(matchesAlertFilter);
    }

    function itemsFor(category, series) {
      return visibleItems().filter((item) => item.category === category && item.series === series);
    }

    function renderMeta() {
      const source = data.source || {};
      const sourceTime = formatDateTime(source.lastModified);
      document.getElementById("source-filename").textContent = `資料來源：${source.filename || "-"}`;
      document.getElementById("source-modified").textContent = `檔案修改：${sourceTime}`;
    }

    function categoryTone(category) {
      if (category === "金山公版") return "public";
      if (category === "金山/欣凱/佑泰專板") return "special";
      if (category === "三櫻系列") return "sakura";
      return "";
    }

    function renderTabs() {
      const categories = ["all", ...categoryNames()];
      if (!categories.includes(state.category)) state.category = "all";
      const items = searchItems();
      const watchCount = items.filter((item) => {
        const alert = purchaseAlertForItem(item);
        return alert.level === "order" || alert.level === "watch";
      }).length;
      const orderCount = items.filter((item) => purchaseAlertForItem(item).level === "order").length;
      const totalNoteCount = data.items.filter(hasItemNote).length;
      const alertTabs = [
        { value: "watch", label: "觀察中", count: watchCount },
        { value: "order", label: "需採購", count: orderCount },
      ];
      const tabRoot = document.getElementById("category-tabs");
      const categoryButtons = categories.map((category) => {
        const label = category === "all" ? "全部" : category;
        const pressed = state.alertFilter === "all" && category === state.category;
        const tone = categoryTone(category);
        const toneAttribute = tone ? ` data-tone="${tone}"` : "";
        return `<button type="button" data-category="${escapeHtml(category)}"${toneAttribute} aria-pressed="${pressed}">${escapeHtml(label)}</button>`;
      });
      const alertButtons = alertTabs.map((tab) => {
        const pressed = tab.value === state.alertFilter;
        return `<button type="button" data-alert-filter="${tab.value}" aria-pressed="${pressed}">${tab.label} <span class="tab-count">${formatNumber(tab.count)}</span></button>`;
      });
      const noteButtonPressed = state.alertFilter === "notes";
      const noteFilterButton = `<button type="button" data-alert-filter="notes" aria-pressed="${noteButtonPressed}" title="只看有備註的品項" aria-label="只看有備註的品項，目前 ${formatNumber(totalNoteCount)} 項">${noteStarSvg("note-star-filter", "note-filter-icon")} <span class="tab-count">${formatNumber(totalNoteCount)}</span></button>`;
      tabRoot.innerHTML = [...categoryButtons, ...alertButtons, noteFilterButton].join("");

      tabRoot.querySelectorAll("[data-category]").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = button.dataset.category;
          state.alertFilter = "all";
          renderTabs();
          renderContent();
        });
      });

      tabRoot.querySelectorAll("[data-alert-filter]").forEach((button) => {
        button.addEventListener("click", () => {
          state.category = "all";
          state.alertFilter = button.dataset.alertFilter;
          renderTabs();
          renderContent();
        });
      });
    }

    function refreshDashboardData() {
      const button = document.getElementById("refresh-data");
      const label = button.querySelector("span");
      button.disabled = true;
      button.dataset.state = "loading";
      if (label) label.textContent = "重新載入";

      const url = new URL(window.location.href);
      url.searchParams.set("refresh", Date.now().toString());
      window.location.replace(url.toString());
    }

    async function loadLatestDashboardData() {
      try {
        const response = await fetch(`./dashboard-data.js?refresh=${Date.now()}`, {
          cache: "no-store"
        });
        if (!response.ok) return;

        data = parseDashboardDataScript(await response.text());
        renderMeta();
        renderTabs();
        renderContent();
      } catch (error) {
        console.error(error);
      }
    }

    function ensureNoteLayer() {
      if (noteLayer.backdrop && noteLayer.popover) return;

      const backdrop = document.createElement("div");
      backdrop.className = "note-backdrop";
      backdrop.addEventListener("click", closeItemNote);

      const popover = document.createElement("aside");
      popover.className = "note-popover";
      popover.hidden = true;
      popover.setAttribute("role", "dialog");
      popover.setAttribute("aria-modal", "false");
      popover.addEventListener("click", (event) => event.stopPropagation());

      const closeButton = document.createElement("button");
      closeButton.className = "note-close";
      closeButton.type = "button";
      closeButton.setAttribute("aria-label", "關閉備註");
      closeButton.textContent = "×";
      closeButton.addEventListener("click", closeItemNote);

      const title = document.createElement("div");
      title.className = "note-popover-title";

      const meta = document.createElement("div");
      meta.className = "note-popover-meta";

      const body = document.createElement("div");
      body.className = "note-popover-body";

      popover.append(closeButton, title, meta, body);
      document.body.append(backdrop, popover);

      noteLayer.backdrop = backdrop;
      noteLayer.popover = popover;
    }

    function closeItemNote() {
      if (!noteLayer.backdrop || !noteLayer.popover) return;
      noteLayer.backdrop.classList.remove("is-open");
      noteLayer.popover.hidden = true;
      noteLayer.activeCode = "";
    }

    function positionItemNote(trigger) {
      const popover = noteLayer.popover;
      if (!popover) return;

      if (window.matchMedia("(max-width: 560px)").matches) {
        popover.style.left = "";
        popover.style.top = "";
        return;
      }

      const gap = 8;
      const edge = 14;
      const triggerRect = trigger.getBoundingClientRect();
      const popoverRect = popover.getBoundingClientRect();
      let left = triggerRect.left;
      let top = triggerRect.bottom + gap;

      if (left + popoverRect.width > window.innerWidth - edge) {
        left = window.innerWidth - popoverRect.width - edge;
      }
      if (top + popoverRect.height > window.innerHeight - edge) {
        top = Math.max(edge, triggerRect.top - popoverRect.height - gap);
      }

      popover.style.left = `${Math.max(edge, left)}px`;
      popover.style.top = `${Math.max(edge, top)}px`;
    }

    function openItemNote(trigger, item) {
      ensureNoteLayer();

      if (noteLayer.activeCode === item.code && !noteLayer.popover.hidden) {
        closeItemNote();
        return;
      }

      const note = noteForItem(item);
      const title = noteLayer.popover.querySelector(".note-popover-title");
      const meta = noteLayer.popover.querySelector(".note-popover-meta");
      const body = noteLayer.popover.querySelector(".note-popover-body");

      title.textContent = item.name;
      meta.textContent = "品項備註";
      body.textContent = note.text || "尚未填寫備註";
      body.classList.toggle("is-empty", !note.text);

      noteLayer.activeCode = item.code;
      noteLayer.popover.hidden = false;
      noteLayer.backdrop.classList.add("is-open");
      positionItemNote(trigger);
    }

    function bindNoteButtonClicks() {
      document.addEventListener("click", (event) => {
        const trigger = event.target.closest("[data-note-code]");
        if (!trigger) return;

        event.preventDefault();
        event.stopPropagation();

        const item = data.items.find((candidate) => candidate.code === trigger.dataset.noteCode);
        if (item) openItemNote(trigger, item);
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeItemNote();
      });

      window.addEventListener("resize", closeItemNote);
    }

    function itemTemplate(item) {
      const purchaseAlert = purchaseAlertForItem(item);
      const costSales = costSalesForItem(item);
      const listPrice = listPriceForItem(item);
      const note = noteForItem(item);
      const hasNote = Boolean(note.text);
      const noteStarGradientId = `note-star-${item.code}`;
      const noteButtonHtml = hasNote
        ? `
              <button class="note-tag" type="button" data-note-code="${escapeHtml(item.code)}" data-has-note="true" title="查看品項備註" aria-label="${escapeHtml(item.name)}備註">
                ${noteStarSvg(noteStarGradientId)}
              </button>
            `
        : "";
      const purchaseAlertHtml = purchaseAlert.alerts.length
        ? `
          <div class="purchase-alerts">
            ${purchaseAlert.alerts.map((alert) => `
              <span class="purchase-badge purchase-badge-${alert.level}">
                ${alert.level === "order" ? "需採購" : "觀察中"}，${escapeHtml(alert.label)}餘: ${formatNumber(alert.value)} 卷，低於安全量: ${formatNumber(alert.threshold)} 卷
              </span>
            `).join("")}
          </div>
        `
        : "";
      const businessMetricsHtml = state.internalUnlocked ? `
        <div class="business-metrics" aria-label="平均成本（未稅）">
          <span class="business-metric">
            <span class="business-metric-label">平均成本（未稅）</span>
            <span class="business-metric-value">${formatAverageCost(costSales?.averageCost)}</span>
          </span>
        </div>
      ` : "";
      const listPriceHtml = listPrice === null ? "" : `
        <div class="list-price-line">
          <span class="list-price-badge" aria-label="牌價 ${formatListPrice(listPrice)}">
            <span class="list-price-label">牌價</span>
            <span class="list-price-value">${formatListPrice(listPrice)}</span>
          </span>
        </div>
      `;
      const warehouseCells = data.warehouseOrder.map((warehouse, index) => {
        const value = item.warehouses[warehouse] || 0;
        const label = data.warehouseLabels[warehouse] || warehouse;
        const toneClass = `warehouse-tone-${index % 5}`;
        if (warehouse === "欣凱倉" && Number(value || 0) === 0) {
          return `<div class="warehouse-cell warehouse-cell-empty ${toneClass}" aria-label="${escapeHtml(label)} 0"></div>`;
        }
        return `
          <div class="warehouse-cell ${toneClass}">
            <span class="warehouse-label">${escapeHtml(label)}</span>
            <span class="warehouse-value ${stockClass(value, item)}">${formatNumber(value)}</span>
          </div>
        `;
      }).join("");

      return `
        <article class="item-row ${Number(item.visibleTotal || 0) === 0 ? "zero-row" : ""}">
          <div class="product-cell">
            <div class="product-title-row${hasNote ? " has-note" : ""}">
              <div class="product-name">${escapeHtml(item.name)}</div>
              ${noteButtonHtml}
            </div>
            ${listPriceHtml}
            <div class="product-sub">
              <span>${escapeHtml(item.code)}</span>
              <span>${escapeHtml(item.spec || "-")}</span>
            </div>
            ${businessMetricsHtml}
            ${purchaseAlertHtml}
          </div>
          ${warehouseCells}
          <div class="total-cell">
            <span class="total-label">合計</span>
            <span class="total-value ${stockClass(item.visibleTotal, item)}">${formatNumber(item.visibleTotal)}</span>
          </div>
        </article>
      `;
    }

    function seriesTemplate(categoryName, series) {
      const items = itemsFor(categoryName, series.name);
      if (!items.length) return "";
      const headLabels = data.warehouseOrder.map((warehouse, index) => {
        const label = data.warehouseLabels[warehouse] || warehouse;
        return `<div class="number-label warehouse-tone-${index % 5}">${escapeHtml(label)}</div>`;
      }).join("");

      return `
        <section class="series">
          <div class="series-head">
            <h3 class="series-title">${escapeHtml(series.name)}</h3>
            <span class="series-count">${formatNumber(items.length)} 項</span>
          </div>
          <div class="list-head">
            <div>品項</div>
            ${headLabels}
            <div class="number-label">合計</div>
          </div>
          <div class="item-list">
            ${items.map(itemTemplate).join("")}
          </div>
        </section>
      `;
    }

    function uncategorizedRules() {
      const known = new Set(data.categoryRules.map((rule) => rule.category));
      const extras = categoryNames().filter((name) => !known.has(name));
      return extras.map((category) => ({
        category,
        series: [{ name: "未分類", items: [] }]
      }));
    }

    function renderContent() {
      closeItemNote();
      const search = document.getElementById("search");
      if (search) state.query = search.value;

      const allVisible = visibleItems();
      const root = document.getElementById("content");
      const empty = document.getElementById("empty-state");
      const rules = [...data.categoryRules, ...uncategorizedRules()];

      document.getElementById("result-count").textContent = `${formatNumber(allVisible.length)} 項`;

      const html = rules.map((categoryRule, categoryIndex) => {
        if (state.category !== "all" && state.category !== categoryRule.category) return "";

        const categoryItems = allVisible.filter((item) => item.category === categoryRule.category);
        if (!categoryItems.length) return "";

        const seriesHtml = categoryRule.series
          .map((series) => seriesTemplate(categoryRule.category, series))
          .join("");

        if (!seriesHtml.trim()) return "";

        return `
          <section class="category-section category-tone-${categoryIndex % 4}">
            <header class="category-head">
              <h2 class="category-title">${escapeHtml(categoryRule.category)}</h2>
              <span class="category-count">${formatNumber(categoryItems.length)} 項</span>
            </header>
            ${seriesHtml}
          </section>
        `;
      }).join("");

      root.innerHTML = html;
      empty.style.display = allVisible.length ? "none" : "grid";
    }

    document.getElementById("search").addEventListener("input", (event) => {
      state.query = event.target.value;
      renderTabs();
      renderContent();
    });

    document.getElementById("search").addEventListener("search", (event) => {
      state.query = event.target.value;
      renderTabs();
      renderContent();
    });

    document.getElementById("refresh-data").addEventListener("click", refreshDashboardData);
    bindNoteButtonClicks();

    renderMeta();
    renderTabs();
    renderContent();
    recordTrafficCount();
    loadLatestDashboardData();
  </script>
</body>
</html>
